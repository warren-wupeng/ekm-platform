app = "ekm-backend"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  DEBUG = "false"
  LLM_MODEL = "anthropic/claude-sonnet-4.6"
  # S3-compatible storage (Fly Tigris). Secrets: S3_ACCESS_KEY_ID, S3_SECRET_ACCESS_KEY
  S3_ENDPOINT_URL = "https://fly.storage.tigris.dev"
  LLM_BASE_URL = "https://ai-gateway.happycapy.ai/api/v1"
  ELASTICSEARCH_URL = "http://ekm-es.internal:9200"
  QDRANT_URL = "http://ekm-qdrant.internal:6333"
  NEO4J_URL = "bolt://ekm-neo4j.internal:7687"
  TIKA_URL = "http://ekm-tika.internal:9998"
  # Wake the Celery worker machine when dispatching tasks (Fly 6PN internal URL).
  WORKER_WAKE_URL = "http://ekm-worker.flycast"

# Volume mount removed — files stored in S3/Tigris.

[[services]]
  internal_port = 8000
  protocol = "tcp"
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    force_https = true
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [services.concurrency]
    hard_limit = 100
    soft_limit = 80
    type = "requests"

  [[services.http_checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "10s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
