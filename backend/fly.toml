app = "ekm-backend"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  DEBUG = "false"
  UPLOAD_DIR = "/data/uploads"
  LLM_MODEL = "anthropic/claude-sonnet-4.6"
  LLM_API_BASE = "https://ai-gateway.happycapy.ai/api/v1"
  ELASTICSEARCH_URL = "http://localhost:9200"
  QDRANT_URL = "http://localhost:6333"
  NEO4J_URL = "bolt://localhost:7687"
  TIKA_URL = "http://localhost:9998"

[[mounts]]
  source = "ekm_uploads"
  destination = "/data/uploads"

[[services]]
  internal_port = 8000
  protocol = "tcp"
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    force_https = true
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [services.concurrency]
    hard_limit = 100
    soft_limit = 80
    type = "requests"

  [[services.http_checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "10s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
